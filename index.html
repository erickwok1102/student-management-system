<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <title>學員管理系統 v3.0</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>學員管理系統</h1>
            <div style="margin-top: 20px;">
                <span style="font-size: 16px;">系統狀態:</span>
                <span class="status-indicator status-online" id="serverStatus"></span>
                <span id="statusText" style="font-weight: 600;">正常運行</span>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('attendance', this)">點名</button>
            <button class="tab" onclick="showTab('students', this)">學員</button>
            <button class="tab" onclick="showTab('sync', this)">同步</button>
        </div>

        <!-- Attendance Tab -->
        <div id="attendanceTab" class="tab-content active">
            <div class="card">
                <h3 class="card-title">點名系統</h3>
                <div class="grid-form">
                    <div class="form-group">
                        <label>日期 *</label>
                        <input type="date" id="attendanceDate" required>
                    </div>
                    <div class="form-group">
                        <label>班別 *</label>
                        <select id="attendanceClass" required disabled>
                            <option value="">請選擇班別</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top: 20px; color: #666; font-size: 14px;">
                    步驟：先選日期 → 再選班別 → 最後開始點名
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button class="btn btn-primary" id="startAttendanceBtn" onclick="startAttendance()" disabled>開始點名</button>
                </div>
            </div>

            <!-- Attendance List -->
            <div class="card" id="attendanceListCard" style="display: none;">
                <h3 class="card-title">點名列表</h3>
                <div id="attendanceStudentsList"></div>
                <div style="margin-top: 30px; text-align: center;">
                    <button class="btn btn-success" onclick="saveAndUploadAttendance()">儲存並上傳</button>
                    <button class="btn btn-warning" onclick="resetAttendance()">重新點名</button>
                </div>
            </div>

            <!-- Today's Attendance -->
            <div class="card">
                <h3 class="card-title">今日點名記錄</h3>
                <div class="student-list" id="todayAttendanceList">
                    <div class="empty-state">
                        <h3>還沒有今日的點名記錄</h3>
                        <p>選擇班別並開始點名</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Students Tab -->
        <div id="studentsTab" class="tab-content">
            <div class="card">
                <h3 class="card-title">新增學員</h3>
                <div class="grid-form">
                    <div class="form-group">
                        <label>學員姓名 *</label>
                        <input type="text" id="studentName" placeholder="請輸入學員姓名" required>
                    </div>
                    <div class="form-group">
                        <label>別名/英文名</label>
                        <input type="text" id="studentNickname" placeholder="別名或英文名 (選填)">
                    </div>
                    <div class="form-group">
                        <label>班別 *</label>
                        <select id="studentClass" required>
                            <option value="">請選擇班別</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>聯絡電話</label>
                        <input type="tel" id="studentPhone" placeholder="聯絡電話">
                    </div>
                    <div class="form-group">
                        <label>電子信箱</label>
                        <input type="email" id="studentEmail" placeholder="電子信箱">
                    </div>
                    <div class="form-group">
                        <label>生日</label>
                        <input type="date" id="studentBirthday" placeholder="選擇生日日期" onchange="handleBirthdayInput()">
                    </div>
                    <div class="form-group">
                        <label>緊急聯絡人</label>
                        <input type="text" id="emergencyContact" placeholder="緊急聯絡人姓名">
                    </div>
                    <div class="form-group">
                        <label>緊急聯絡電話</label>
                        <input type="tel" id="emergencyPhone" placeholder="緊急聯絡電話">
                    </div>
                </div>
                <div class="form-group">
                    <label>備註</label>
                    <textarea id="studentRemarks" placeholder="其他備註資訊" rows="4"></textarea>
                </div>
                <div style="margin-top: 30px; text-align: center;">
                    <button class="btn btn-success" onclick="addStudent()">新增學員</button>
                    <button class="btn btn-primary" onclick="loadStudents()">重新載入</button>
                    <button class="btn btn-warning" onclick="clearForm()">清空表單</button>
                </div>
            </div>

            <div class="card">
                <h3 class="card-title">學員列表</h3>
                <div style="margin-bottom: 15px; text-align: right;">
                    <button class="btn btn-primary" onclick="saveStudentsToCloud()">儲存變更到雲端</button>
                </div>
                <div class="student-list" id="studentList">
                    <div class="empty-state">
                        <h3>載入中...</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sync Tab -->
        <div id="syncTab" class="tab-content">
            <div class="card">
                <h3 class="card-title">Google Sheets 同步</h3>
                <div class="sync-grid">
                    <div class="sync-card">
                        <h4 class="card-subtitle" style="color: #28a745;">上傳學員資料</h4>
                        <button class="btn btn-success" onclick="syncToCloud()" style="width: 100%; margin-bottom: 20px;">
                            同步學員到雲端
                        </button>
                        <p style="font-size: 14px; color: #666; line-height: 1.6;">
                            將本地學員資料上傳到 Google Sheets<br>
                            <strong>注意：</strong>會覆蓋雲端現有資料
                        </p>
                    </div>
                    <div class="sync-card">
                        <h4 class="card-subtitle" style="color: #007bff;">載入學員資料</h4>
                        <button class="btn btn-primary" onclick="loadFromCloud()" style="width: 100%; margin-bottom: 20px;">
                            從雲端載入學員
                        </button>
                        <p style="font-size: 14px; color: #666; line-height: 1.6;">
                            從 Google Sheets 載入學員資料<br>
                            <strong>注意：</strong>會覆蓋本地現有資料
                        </p>
                    </div>
                    <div class="sync-card">
                        <h4 class="card-subtitle" style="color: #ffc107;">點名記錄</h4>
                        <button class="btn btn-warning" onclick="syncAttendanceToCloud()" style="width: 100%; margin-bottom: 10px;">
                            上傳到 Google Sheets
                        </button>
                        <button class="btn btn-primary" onclick="showAttendanceRecords()" style="width: 100%; margin-bottom: 20px;">
                            查看本地記錄
                        </button>
                        <p style="font-size: 14px; color: #666; line-height: 1.6;">
                            上傳點名記錄到 Google Sheets<br>
                            <strong>記錄數：</strong><span id="attendanceCount">0</span> 筆<br>
                            <small style="color: #e74c3c;">上傳成功後將清空本地記錄</small>
                        </p>
                    </div>
                </div>
                <div class="sync-status">
                    <h4>同步狀態</h4>
                    <p id="syncStatus">系統已啟動，準備就緒</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Element -->
    <div id="notification" class="notification"></div>

    <!-- JavaScript Files -->
    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/students.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
